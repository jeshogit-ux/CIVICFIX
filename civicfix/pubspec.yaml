name: civic_fix
description: "Premium Urban Governance & Ethics Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  geolocator: ^10.1.0
  image_picker: ^1.0.7
  intl: ^0.19.0

# --- DEV DEPENDENCIES ---
# These tools help you find bugs and errors while you code 
# but are not included when you ship the app to users.
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 # Essential for "Zero Error" code style

flutter:
  uses-material-design: true

  # --- ASSET CONFIGURATION ---
  # This tells Flutter which files to "pack" into the app.
  # Create a folder named 'assets' in your project root first!
  assets:
    - assets/images/logo.png
    - assets/images/scanner_overlay.png
    - assets/data/security_quiz.json